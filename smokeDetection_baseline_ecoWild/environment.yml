# ============================================================
# environment.yml
# Full micromamba environment for smokeDetection_baseline_ecoWild.
# Covers training, model conversion, and all inference scripts.
#
# Create with:
#   micromamba env create -f environment.yml
#   micromamba activate ecowild-baseline
#
# Target platform: Jetson Orin Nano, JetPack 5.0.2 (L4T R35.1.0), Python 3.8
# ============================================================

name: ecowild-baseline

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.8

  # Image processing & numerics
  # numpy<2.0 required: PyTorch 2.0.0 was released before numpy 2.0 and is not compatible with it
  - numpy>=1.23,<2.0
  - pillow>=9.0
  - opencv>=4.7       # note: conda-forge name is 'opencv', not 'opencv-python'

  # Model serving
  - ultralytics>=8.0  # YOLOv8 (.pt weights + training)
  - onnx>=1.14        # ONNX model export / inspection
  - onnxruntime>=1.16 # CPU fallback; see pip section for Jetson GPU version
  - pycuda>=2022.1    # required for TensorRT inference scripts

  # Data handling & utilities
  - pandas>=1.5
  - tqdm>=4.65
  - pyyaml>=6.0       # used in Train/yolov8_training.py
  - scikit-learn>=1.3 # used in Train/simple_resnet.py
  - matplotlib>=3.7   # used in Train/simple_resnet.py

  # pip-managed packages
  - pip
  - pip:
    # PyTorch — conda-forge builds lack CUDA support for Jetson's ARM architecture.
    # After env creation, reinstall with the NVIDIA Jetson wheel for JetPack 5.0.2:
    #
    #   pip install torch==2.0.0 torchvision==0.15.2 \
    #     --index-url https://developer.download.nvidia.com/compute/redist/jp/v50/pytorch/
    #
    # The lines below install CPU-only builds as a placeholder on non-Jetson machines.
    - torch==2.0.0
    - torchvision==0.15.2

    # On Jetson, replace onnxruntime above with the NVIDIA GPU-accelerated wheel:
    #
    #   pip install onnxruntime-gpu \
    #     --index-url https://developer.download.nvidia.com/compute/redist/jp/v50/onnxruntime/

    # Jetson-only (uncomment on the board):
    # - Jetson.GPIO     # GPIO control used in original inference scripts
    # - jetson-stats    # optional: jtop power API for energy_eval.py

    # TensorRT is NOT installable via pip or conda — it ships with JetPack.
    # It will be available system-wide after JetPack installation.
